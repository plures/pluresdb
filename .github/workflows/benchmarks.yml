name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Which benchmark suite to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - rust
          - deno
          - crud
          - sync
          - vector

permissions:
  contents: read

jobs:
  # ── Rust Criterion benchmarks ──────────────────────────────────────────────
  rust-benchmarks:
    name: Rust Benchmarks (Criterion)
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'rust' ||
      github.event.inputs.suite == 'crud' ||
      github.event.inputs.suite == 'sync'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: bench-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: bench-cargo-${{ runner.os }}-

      - name: Cache build target
        uses: actions/cache@v4
        with:
          path: target
          key: bench-target-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: bench-target-${{ runner.os }}-

      - name: Run CRDT benchmarks
        run: cargo bench --bench crdt_benchmarks -p pluresdb-core 2>&1 | tee /tmp/crdt_bench.txt

      - name: Run Sync benchmarks
        run: cargo bench --bench sync_benchmarks -p pluresdb-core 2>&1 | tee /tmp/sync_bench.txt

      - name: Run SQL benchmarks
        run: cargo bench --bench sql_benchmarks -p pluresdb-core 2>&1 | tee /tmp/sql_bench.txt

      - name: Upload Criterion HTML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-reports
          path: target/criterion/
          retention-days: 30

      - name: Upload raw benchmark output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-bench-output
          path: /tmp/*.txt
          retention-days: 30

  # ── Deno benchmark suites ──────────────────────────────────────────────────
  deno-benchmarks:
    name: Deno Benchmarks
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'deno' ||
      github.event.inputs.suite == 'crud' ||
      github.event.inputs.suite == 'sync' ||
      github.event.inputs.suite == 'vector'
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Run core CRUD benchmarks
        run: deno run -A --unstable-kv legacy/benchmarks/run-benchmarks.ts 2>&1 | tee /tmp/crud_bench.txt
        if: >
          github.event.inputs.suite == 'all' ||
          github.event.inputs.suite == 'deno' ||
          github.event.inputs.suite == 'crud'

      - name: Run sync benchmarks
        run: deno run -A --unstable-kv legacy/benchmarks/sync-benchmarks.ts 2>&1 | tee /tmp/sync_deno_bench.txt
        if: >
          github.event.inputs.suite == 'all' ||
          github.event.inputs.suite == 'deno' ||
          github.event.inputs.suite == 'sync'

      - name: Run vector search benchmarks
        run: deno run -A --unstable-kv legacy/benchmarks/vector-benchmarks.ts 2>&1 | tee /tmp/vector_bench.txt
        if: >
          github.event.inputs.suite == 'all' ||
          github.event.inputs.suite == 'deno' ||
          github.event.inputs.suite == 'vector'

      - name: Run memory benchmarks
        run: deno run -A --unstable-kv legacy/benchmarks/memory-benchmarks.ts 2>&1 | tee /tmp/memory_bench.txt
        if: >
          github.event.inputs.suite == 'all' ||
          github.event.inputs.suite == 'deno'

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deno-bench-output
          path: /tmp/*_bench.txt
          retention-days: 30
