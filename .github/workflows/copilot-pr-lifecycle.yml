name: Copilot PR Lifecycle

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, closed]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  issues:
    types: [opened, labeled]
  milestone:
    types: [closed]
  schedule:
    - cron: '0 */2 * * *'  # every 2h fallback sweep (event triggers handle real-time); cut from */30 to reduce Actions spend
  workflow_dispatch:

jobs:
  lifecycle:
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref || '', 'dependabot/')
    uses: plures/.github/.github/workflows/copilot-pr-lifecycle-reusable.yml@main
    secrets:
      COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
