name: PR Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional-commits:
    name: Conventional commit title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title follows Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
        run: |
          # Skip check for draft PRs — they are explicitly WIP.
          # Rationale: requiring a conventional title on draft PRs creates a
          # feedback loop where auto-generated "[WIP]" titles trigger a CI
          # failure, which spawns a fix issue, which opens another "[WIP]" PR,
          # which fails again.  Defer the check until the PR is ready for review.
          if [ "$IS_DRAFT" = "true" ]; then
            echo "⏭️  Draft PR — skipping title check (update title before marking ready for review)."
            exit 0
          fi

          # Skip check for bot-authored PRs (e.g. Copilot SWE agent).
          # Bots cannot easily rename their auto-generated PR titles, so
          # enforcing the rule on them recreates the same feedback loop as
          # draft PRs above.  Human reviewers should rename before merging.
          if [ "$AUTHOR_TYPE" = "Bot" ]; then
            echo "⏭️  Bot-authored PR — skipping title check."
            echo "    Current title : '$PR_TITLE'"
            echo "    Action needed : Rename to a Conventional Commits title before merging."
            exit 0
          fi

          # Conventional Commits pattern: type(scope)!: description
          # Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?!?: .{3,}'
          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "✅ PR title follows Conventional Commits format: $PR_TITLE"
          else
            echo "❌ PR title does not follow Conventional Commits format."
            echo ""
            echo "Expected format: type(scope): description"
            echo "Examples:"
            echo "  feat(storage): add blob compression"
            echo "  fix(sync): handle disconnected peers gracefully"
            echo "  docs: update CONTRIBUTING guide"
            echo "  chore(deps): bump @plures/design-dojo to 0.10.6"
            echo ""
            echo "Valid types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
            echo ""
            echo "Do NOT use [WIP] or similar prefixes — open a draft PR instead."
            echo "See CONTRIBUTING.md (Pull Request Process section) for details."
            echo ""
            echo "Got: $PR_TITLE"
            exit 1
          fi
