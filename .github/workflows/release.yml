name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force version bump (patch/minor/major)'
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    uses: plures/.github/.github/workflows/release-reusable.yml@main
    with:
      # `inputs` context is not available on push events; use event payload inputs.
      bump: ${{ github.event.inputs.bump || '' }}
    secrets: inherit
