name: Release

concurrency:
  group: release-${{ github.repository }}-${{ github.ref_name }}
  # Serialize release runs so that only one release can push to main at a
  # time.  This prevents the race condition where two concurrent jobs both
  # attempt to push a version-bump commit and the second fails with a
  # non-fast-forward error (which previously caused a confusing rebase-
  # conflict failure in the old inline version-bump-and-tag job).
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Force version bump (none/patch/minor/major)'
        type: choice
        options: [none, patch, minor, major]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    # Use org reusable release workflow.
    uses: plures/.github/.github/workflows/release-reusable.yml@main
    with:
      bump: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump || '' }}
    secrets: inherit

  notify-on-failure:
    name: Notify on release failure
    runs-on: ubuntu-latest
    needs: release
    # Run only when the release job itself failed (not when it was skipped or
    # cancelled) so that transient cancellations don't flood the issue tracker.
    if: ${{ failure() && needs.release.result == 'failure' }}
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Release tag creation failed";

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              core.info(
                `An open issue already exists for release failure (#${existing.number}). Skipping creation.`,
              );
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body: `The automated release process failed to create/push a tag. Manual intervention required.\n\n**Failed workflow:** ${context.workflow}\n**Run ID:** ${context.runId}\n**Commit:** ${context.sha}\n\nPlease check the workflow logs and manually create the missing tag if needed.\n\nSee: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["bug", "release", "automation"],
            });

  notify-on-success:
    name: Close stale release failure issues
    runs-on: ubuntu-latest
    needs: release
    # Run only when the release job succeeded so that any previously opened
    # "Release tag creation failed" issues are closed automatically.
    if: ${{ success() && needs.release.result == 'success' }}
    permissions:
      issues: write
    steps:
      - name: Close open failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Release tag creation failed";

            // Filter by label to keep the result set small and avoid accidentally
            // closing unrelated issues that happen to share the same title.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "release",
              per_page: 100,
            });

            const stale = issues.filter(
              (issue) =>
                issue.title === title &&
                issue.labels.some((l) => l.name === "automation"),
            );
            for (const issue of stale) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `✅ A subsequent release run completed successfully. This issue is being closed automatically.\n\n**Resolved by workflow run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
              });
              core.info(`Closed stale release failure issue #${issue.number}`);
            }
