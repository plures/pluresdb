name: CI

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run fmt:check
        continue-on-error: true
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run build:lib
        continue-on-error: true

      - name: Build
        run: npm run build:lib

      - name: Check example type safety
        run: deno check examples/sync-configuration.ts examples/storage-encryption.ts
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

  release-check:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run release-check
        run: npm run release-check

  version-bump-and-tag:
    name: Bump version and tag (main)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Install dependencies
        run: npm ci

      - name: Determine bump type and update changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if this is already a release commit
          if git log -1 --pretty=%s | grep -qE '^chore\(release\):'; then
            echo "Release commit detected, skipping bump."
            exit 0
          fi

          # Find the globally highest version tag (not just reachable from HEAD).
          # A previous partial run may have pushed a tag whose release commit is
          # not reachable from HEAD, causing "tag already exists" on git tag.
          global_last_tag=$(git tag --list 'v[0-9]*' --sort=-v:refname 2>/dev/null | head -1)
          # Use the last reachable tag for commit range (changelog entries).
          reachable_last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          range=""
          if [ -n "$reachable_last_tag" ]; then
            range="$reachable_last_tag..HEAD"
            echo "📋 Analyzing commits since $reachable_last_tag"
          else
            echo "📋 No previous tags found, will create initial tag"
            range="--all"
          fi
          if [ -n "$global_last_tag" ] && [ "$global_last_tag" != "$reachable_last_tag" ]; then
            echo "⚠️  Global highest tag ($global_last_tag) differs from last reachable tag ($reachable_last_tag) — will sync version baseline"
          fi

          subjects=$(git log --format=%s $range)
          bodies=$(git log --format=%B $range)
          
          # Log the commits being analyzed
          echo "Commits to analyze:"
          git log --oneline $range | head -10

          # Default to patch bump
          bump="patch"
          
          # Check for feature commits (minor bump)
          if echo "$subjects" | grep -Ei '^feat(\(.+\))?: ' >/dev/null; then
            bump="minor"
            echo "📦 Feature commits detected - will bump minor version"
          fi
          
          # Check for BREAKING CHANGE (major bump)
          if echo "$bodies" | grep -E '^BREAKING CHANGE:' >/dev/null || echo "$subjects" | grep -E '^[a-z]+(\(.+\))?!:' >/dev/null; then
            current_major=$(node -p "require('./package.json').version.split('.')[0]")
            if [ "$current_major" -ge 1 ]; then
              bump="major"
              echo "⚠️  BREAKING CHANGE detected - will bump major version"
            else
              bump="minor"
              echo "⚠️  BREAKING CHANGE detected but version < 1.0.0 - will bump minor version instead"
            fi
          fi
          
          echo "✅ Determined bump type: $bump"

          # Sync package.json to the globally highest existing tag before bumping.
          # This ensures the version bump targets a new version that has no existing tag,
          # avoiding collisions when a previous run created a higher tag than what is
          # currently in package.json (e.g., after a partial push failure).
          if [ -n "$global_last_tag" ]; then
            global_base="${global_last_tag#v}"
            if ! npm version "$global_base" --no-git-tag-version --allow-same-version; then
              echo "Failed to sync package.json to global base version: $global_base"
              exit 1
            fi
            echo "📋 Synced package.json to global base version: $global_base"
          fi

          # Bump version in package.json
          npm version "$bump" --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          
          # Update version in Cargo.toml workspace
          sed -i "s/^version = \".*\"/version = \"$new_version\"/" Cargo.toml
          
          # Update version in deno.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$new_version\"/" deno.json
          
          # Update changelog with new version
          npm run update-changelog "$new_version"

          # Add files to git
          git add CHANGELOG.md package.json package-lock.json Cargo.toml deno.json

          # Create commit and tag
          git commit --no-verify -m "chore(release): $new_version"
          # If the tag exists locally (fetched from remote as an orphan from a previous
          # partial run), delete it so we can re-tag on the new release commit.
          if git tag -l "v$new_version" | grep -qF "v$new_version"; then
            tag_commit=$(git rev-list -n 1 "v$new_version" 2>/dev/null || echo "")
            if [ -n "$tag_commit" ] && ! git merge-base --is-ancestor "$tag_commit" HEAD 2>/dev/null; then
              echo "⚠️  Tag v$new_version exists but points to an unreachable commit — deleting orphaned tag before re-tagging"
              git tag -d "v$new_version"
            else
              echo "❌ ERROR: Tag v$new_version already exists on a reachable commit — version conflict, manual intervention required"
              exit 1
            fi
          fi
          git tag "v$new_version"

          # Push commit and tags with retry logic
          for i in {1..3}; do
            echo "Attempt $i: Pushing commit and tags..."
            if git push origin main && git push origin "refs/tags/v$new_version"; then
              echo "✅ Push successful on attempt $i"
              break
            else
              echo "❌ Push failed on attempt $i"
              if [ $i -eq 3 ]; then
                echo "ERROR: Failed to push after 3 attempts"
                exit 1
              fi
              echo "Fetching remote changes before retrying in 5 seconds..."
              sleep 5
              # Remove local tag and reset to the current remote HEAD to avoid
              # rebase conflicts (e.g. concurrent release commits both modifying
              # CHANGELOG.md).  We regenerate the full release commit on top of
              # whatever is now on origin/main instead of rebasing.
              git tag -d "v$new_version" 2>/dev/null || true
              git fetch origin main || { echo "ERROR: Failed to fetch from origin"; exit 1; }
              git reset --hard origin/main

              # If a concurrent job already released this exact version (the one
              # we originally computed before the reset), our trigger commit is
              # covered and there is nothing left to do.  We intentionally check
              # the pre-reset $new_version here — after recalculation below the
              # version may be different (e.g. 2.17.2 vs 2.17.1).
              if git log --format=%s origin/main | grep -qF "chore(release): $new_version"; then
                echo "✅ Version $new_version was already released by a concurrent job, skipping"
                exit 0
              fi

              # Re-sync to the globally highest tag (may have advanced due to a
              # concurrent release) and re-calculate the new version.
              new_global_tag=$(git tag --list 'v[0-9]*' --sort=-v:refname 2>/dev/null | head -1)
              if [ -n "$new_global_tag" ]; then
                new_global_base="${new_global_tag#v}"
                npm version "$new_global_base" --no-git-tag-version --allow-same-version >/dev/null 2>&1
              fi
              npm version "$bump" --no-git-tag-version
              new_version=$(node -p "require('./package.json').version")
              echo "📦 Retry: will release v$new_version"

              # If the recalculated version already has a tag, another job pushed it.
              if [ -n "$(git tag -l "v$new_version")" ]; then
                echo "✅ Tag v$new_version already exists (released by concurrent job), skipping"
                exit 0
              fi

              # Regenerate all release artifacts on the new base.
              sed -i "s/^version = \".*\"/version = \"$new_version\"/" Cargo.toml
              sed -i "s/\"version\": \".*\"/\"version\": \"$new_version\"/" deno.json
              npm run update-changelog "$new_version"
              git add CHANGELOG.md package.json package-lock.json Cargo.toml deno.json
              git commit --no-verify -m "chore(release): $new_version"
              git tag "v$new_version"
            fi
          done

          # Verify tag was pushed successfully
          echo "Verifying tag was pushed to remote..."
          sleep 10
          if git ls-remote --tags origin | grep -q "refs/tags/v$new_version"; then
            echo "✅ Tag v$new_version verified on remote"
          else
            echo "❌ ERROR: Tag v$new_version not found on remote after push"
            exit 1
          fi

      - name: Notify on tag failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Release tag creation failed',
              body: `The automated release process failed to create/push a tag. Manual intervention required.
              
              **Failed workflow:** ${context.workflow}
              **Run ID:** ${context.runId}
              **Commit:** ${context.sha}
              
              Please check the workflow logs and manually create the missing tag if needed.
              
              See: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'release', 'automation']
            })
