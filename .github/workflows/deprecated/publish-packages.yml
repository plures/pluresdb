name: Build and Publish Packages

on:
  # Disabled: replaced by the org-level release-reusable workflow (release.yml).
  # Kept as workflow_dispatch only for manual emergency use.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build packages for (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  build-packages:
    name: Build Packages
    runs-on: ${{ matrix.os }}
    if: startsWith(inputs.tag, 'v')
    permissions:
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install curl unzip -y

      - name: Run build script (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          cd packaging/scripts
          chmod +x build-packages.sh
          ./build-packages.sh --version ${{ inputs.tag }}

      - name: Run build script (Windows)
        if: runner.os == 'Windows'
        run: |
          cd packaging/scripts
          powershell -ExecutionPolicy Bypass -File build-packages.ps1 -Version ${{ inputs.tag }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ runner.os }}
          path: packaging/scripts/dist/*
