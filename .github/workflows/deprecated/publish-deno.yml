name: Publish to Deno

on:
  # Disabled: replaced by the org-level release-reusable workflow (release.yml).
  # Kept as workflow_dispatch only for manual emergency use.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to mirror to deno.land/x (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  publish-deno:
    name: Publish to Deno Land
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag, 'v')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Publish to deno.land/x
        run: |
          # Install deno_mirror CLI
          deno install --allow-all --name deno_mirror https://deno.land/x/deno_mirror/cli.ts

          # Mirror to deno.land/x
          deno_mirror --repo=${{ github.repository }} --tag=${{ inputs.tag }}
