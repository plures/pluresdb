name: Publish Docker Image

on:
  # Disabled: replaced by the org-level release-reusable workflow (release.yml).
  # Kept as workflow_dispatch only for manual emergency use.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  publish-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    if: startsWith(inputs.tag, 'v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            pluresdb/pluresdb:latest
            pluresdb/pluresdb:${{ inputs.tag }}
